<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Exam Performance Indicator</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f2f2f2;
        }

        .login{
            width:500px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        label{
            font-weight:bold;
        }

        select,input{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:10px;
            background:#4CAF50;
            color:white;
            border:none;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }
    </style>
</head>

<body>

<div class="login">

<h1>Student Exam Performance Indicator</h1>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<legend><h2>Student Exam Performance Prediction</h2></legend>

<label>Gender</label>
<select name="gender" required>
<option selected disabled value="">Select your Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Race or Ethnicity</label>
<select name="race_ethnicity" required>
<option selected disabled value="">Select Ethnicity</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<label>Parental Level of Education</label>
<select name="parental_level_of_education" required>
<option selected disabled value="">Select Parent Education</option>
<option value="associate's degree">Associate's Degree</option>
<option value="bachelor's degree">Bachelor's Degree</option>
<option value="high school">High School</option>
<option value="master's degree">Master's Degree</option>
<option value="some college">Some College</option>
<option value="some high school">Some High School</option>
</select>

<label>Lunch Type</label>
<select name="lunch" required>
<option selected disabled value="">Select Lunch Type</option>
<option value="standard">Standard</option>
<option value="free/reduced">Free/Reduced</option>
</select>

<label>Test Preparation Course</label>
<select name="test_preparation_course" required>
<option selected disabled value="">Select Course</option>
<option value="none">None</option>
<option value="completed">Completed</option>
</select>

<label>Reading Score</label>
<input type="number" name="reading_score" placeholder="Enter Reading Score" required>

<label>Writing Score</label>
<input type="number" name="writing_score" placeholder="Enter Writing Score" required>

<button type="submit">Predict Math Score</button>

</form>

<br>
<h2>
{{ results }}
</h2>

</div>

</body>
</html>
